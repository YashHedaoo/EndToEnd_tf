name: Terraform CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    name: Lint, Validate, Scan, and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0


      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Run Checkov Security Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          config_file: policies/checkov/config.yaml
          framework: terraform
          soft_fail: false

      - name: Run tfsec Security Scan
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: .
          additional_args: --config-file policies/tfsec/config.json

      - name: Run Terraform Native Tests
        env:
          AWS_ACCESS_KEY_ID: mock_key
          AWS_SECRET_ACCESS_KEY: mock_secret
          AWS_DEFAULT_REGION: us-east-1
        run: terraform test -test-directory=tests/terraform


  deploy_dev:
    name: Deploy to Dev
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Deploy DEV environment
        run: |
          cd environments/dev
          terraform init -backend=false
          terraform plan -no-color

  deploy_test:
    name: Deploy to Test
    needs: deploy_dev
    runs-on: ubuntu-latest
    environment: test # Uses GitHub Environment with required reviewers for gate approval
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Deploy TEST environment
        run: |
          cd environments/test
          terraform init -backend=false
          terraform plan -no-color

  deploy_stage:
    name: Deploy to Stage
    needs: deploy_test
    runs-on: ubuntu-latest
    environment: stage # Uses GitHub Environment with required reviewers for gate approval
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Deploy STAGE environment
        run: |
          cd environments/stage
          terraform init -backend=false
          terraform plan -no-color
